# WaveKit Development Nginx Configuration
# Reverse proxy for cleaner URLs and WebSocket handling

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream definitions
    upstream wavekit_api {
        server wavekit-api:9000;
        keepalive 32;
    }

    upstream wavekit_ws {
        server wavekit-api:4713;
        keepalive 32;
    }

    upstream wavekit_audio {
        server wavekit-api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # REST API
        location /api/ {
            proxy_pass http://wavekit_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health endpoint (no /api prefix)
        location /health {
            proxy_pass http://wavekit_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # WebSocket events
        location /ws {
            proxy_pass http://wavekit_ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400; # Long timeout for WebSockets
        }

        # Audio stream (for browser-based players)
        location /audio {
            proxy_pass http://wavekit_audio/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Status page
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        # Default - serve static files or 404
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
