# Direwolf configuration for WaveKit
# Disables audio output/PTT to prevent errors in container environment

# Station callsign (required for direwolf operation)
# Using placeholder - override in custom config for licensed operation
MYCALL N0CALL

# Audio input from stdin (will be overridden by command line if needed, but good default)
# Audio output to null (disable transmit)
ADEVICE stdin null

# Channel 0 configuration
CHANNEL 0
