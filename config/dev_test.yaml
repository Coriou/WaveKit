sources:
  # IQ directly from Pi's rtlmux - PRIMARY SOURCE
  # This is the main IQ source that feeds all decoders via fanout
  - id: pi-iq
    type: rtl_tcp
    host: 192.168.1.69
    port: 1235
    caps:
      kind: iq
      sampleRate: 2048000
      format: U8_IQ
      exclusive: false

  # Audio from SDR++ on Mac (optional, for audio monitoring)
  - id: sdrpp
    type: sdrpp-network
    host: host.docker.internal
    port: 7355
    caps:
      kind: audio_pcm
      sampleRate: 48000
      format: S16LE
      exclusive: false

decoders:
  # Pager/data decoder - POCSAG, FLEX, EAS alerts, DTMF, AFSK1200
  # Now uses IQ source with internal csdr FM demodulation
  - id: pagers
    type: multimon-ng
    enabled: true
    sourceId: pi-iq
    options:
      modes: [POCSAG512, POCSAG1200, POCSAG2400, FLEX]
      inputSampleRate: 2048000 # Must match Pi rtl_tcp sample rate
      fmGain: 3 # Match working demod-test.sh gain
      # DEBUG: Record demodulated audio for analysis
      debugRecordPath: /data/debug_audio

  # Digital voice decoder - DMR, P25, YSF, D-Star, NXDN, ProVoice
  # Now uses IQ source with internal csdr FM demodulation
  - id: digital-voice
    type: dsd-fme
    enabled: true
    sourceId: pi-iq
    options:
      mode: auto
      output: null
      inputSampleRate: 2048000 # Must match Pi rtl_tcp sample rate
      fmGain: 3 # Match working POCSAG value
      # DEBUG: Record demodulated audio for analysis
      debugRecordPath: /data/debug_audio

  # APRS/AX.25 decoder - amateur radio packet
  # Still uses SDR++ audio (direwolf NetworkProducerDecoder pattern not yet migrated)
  - id: aprs
    type: direwolf
    enabled: false
    sourceId: pi-iq
    options:
      audioDevice: stdin
      sampleRate: 48000

  # ISM band decoder - weather sensors, tire pressure, remotes
  - id: rtl433
    type: rtl433
    enabled: false
    sourceId: pi-iq
    options:
      sampleRate: 2048000
      outputFormat: json

  # Maritime AIS decoder - ship positions and data
  - id: ais
    type: ais-catcher
    enabled: false
    sourceId: pi-iq
    options:
      outputFormat: json

  # ACARS decoder - aircraft data link messages
  - id: acars
    type: acarsdec
    enabled: false
    sourceId: pi-iq
    options:
      frequencies: [131550000, 131725000]

  # VDL2 decoder - aviation VDL Mode 2 data link
  - id: vdl2
    type: dumpvdl2
    enabled: false
    sourceId: pi-iq
    options:
      frequencies: [136650000, 136975000]

  # ADS-B decoder - aircraft transponders (1090 MHz)
  # Note: Works best with dedicated SDR at 1090 MHz / 2.0 Msps
  # In shared IQ mode, will run idle if frequency/sample rate don't match
  - id: adsb
    type: readsb
    enabled: false
    sourceId: pi-iq
    options:
      outputFormat: json

audio:
  tcpPort: 8080
  format: S16LE
  sampleRate: 48000
  monitoring: true

api:
  host: 0.0.0.0
  port: 3000
