sources:
  # IQ directly from Pi's rtlmux - PRIMARY SOURCE
  # This is the main IQ source that feeds all decoders via fanout
  - id: pi-iq
    type: rtl_tcp
    host: 192.168.1.69
    port: 1235
    caps:
      kind: iq
      sampleRate: 2048000
      format: U8_IQ
      exclusive: false

  # Audio from SDR++ on Mac (optional, for audio monitoring)
  - id: sdrpp
    type: sdrpp-network
    host: host.docker.internal
    port: 7355
    caps:
      kind: audio_pcm
      sampleRate: 48000
      format: S16LE
      exclusive: false

decoders:
  # Pager/data decoder - POCSAG, FLEX, EAS alerts, DTMF, AFSK1200
  # Now uses IQ source with internal csdr FM demodulation
  - id: pagers
    type: multimon-ng
    enabled: true
    sourceId: pi-iq
    options:
      modes: [POCSAG512, POCSAG1200, POCSAG2400, FLEX]
      inputSampleRate: 2048000 # Must match Pi rtl_tcp sample rate
      fmGain: 3 # Match working demod-test.sh gain

  # Digital voice decoder - DMR, P25, YSF, D-Star, NXDN, ProVoice
  # Now uses IQ source with internal csdr FM demodulation
  - id: digital-voice
    type: dsd-fme
    enabled: true
    sourceId: pi-iq
    options:
      mode: auto
      output: null
      inputSampleRate: 2048000 # Must match Pi rtl_tcp sample rate
      fmGain: 2.0 # TUNED: Balanced gain minimizes clipping + FEC errors (was 5.0)
      enablePerCallRecording: true
      perCallRecordingDir: /app/decoded_calls

  # APRS/AX.25 decoder - amateur radio packet (AudioDemodDecoder)
  # Uses IQ source with csdr FM demodulation to audio, then direwolf KISS output
  - id: aprs
    type: direwolf
    enabled: true
    sourceId: pi-iq
    options:
      audioDevice: stdin
      sampleRate: 48000
      inputSampleRate: 2048000 # Must match source
      fmGain: 2.5 # Start here, tune if needed
      kissPort: 8001
      callsign: N0CALL

  # ISM band decoder - weather sensors, tire pressure, remotes (BaseDecoder IQ stdin)
  - id: rtl433
    type: rtl433
    enabled: true
    sourceId: pi-iq
    options:
      sampleRate: 2048000
      outputFormat: json

  # Maritime AIS decoder - ship positions and data (BaseDecoder IQ stdin)
  - id: ais
    type: ais-catcher
    enabled: true
    sourceId: pi-iq
    options:
      outputFormat: json
      inputSampleRate: 2048000

  # ACARS decoder - aircraft data link messages
  # Uses shared IQ source with internal AM demodulation
  - id: acars
    type: acarsdec
    enabled: true
    sourceId: pi-iq
    options:
      # rtlTcpHost/Port removed - uses shared IQ
      inputSampleRate: 2048000 # Must match source
      frequencies: [131550000, 131725000]
      outputFormat: json

  # VDL2 decoder - aviation VDL Mode 2 data link (BaseDecoder IQ stdin)
  - id: vdl2
    type: dumpvdl2
    enabled: true
    sourceId: pi-iq
    options:
      frequencies: [136650000, 136975000]
      outputFormat: json

  # ADS-B decoder - aircraft transponders (NetworkProducerDecoder)
  # Note: Works best with dedicated SDR at 1090 MHz / 2.0 Msps
  # In shared IQ mode (stdin), will run idle if frequency/sample rate don't match
  - id: adsb
    type: readsb
    enabled: true
    sourceId: pi-iq
    options:
      outputFormat: json

audio:
  tcpPort: 8080
  format: S16LE
  sampleRate: 48000
  monitoring: true

api:
  host: 0.0.0.0
  port: 3000
