sources:
  # Audio from SDR++ on Mac (when running)
  - id: sdrpp
    type: sdrpp-network
    host: host.docker.internal
    port: 7355
    caps:
      kind: audio_pcm
      sampleRate: 48000
      format: S16LE
      exclusive: false

  # IQ directly from Pi's rtl_tcp (for rtl433)
  - id: pi-iq
    type: rtl_tcp
    host: 192.168.1.69
    port: 1235
    caps:
      kind: iq
      sampleRate: 250000
      format: U8_IQ
      exclusive: false

decoders:
  # Pager/data decoder - POCSAG, FLEX, EAS alerts, DTMF, AFSK1200
  - id: pagers
    type: multimon-ng
    enabled: true
    sourceId: sdrpp
    options:
      modes: [POCSAG512, POCSAG1200, POCSAG2400, FLEX]

  # Digital voice decoder - DMR, P25, YSF, D-Star, NXDN, ProVoice
  - id: digital-voice
    type: dsd-fme
    enabled: true
    sourceId: sdrpp
    options:
      mode: auto
      output: null

  # APRS/AX.25 decoder - amateur radio packet
  - id: aprs
    type: direwolf
    enabled: true
    sourceId: sdrpp
    options:
      audioDevice: stdin
      sampleRate: 48000

  # ISM band decoder - weather sensors, tire pressure, remotes
  - id: rtl433
    type: rtl433
    enabled: true
    sourceId: pi-iq
    options:
      sampleRate: 250000
      outputFormat: json

audio:
  tcpPort: 8080
  format: S16LE
  sampleRate: 48000
  monitoring: true

api:
  host: 0.0.0.0
  port: 3000
