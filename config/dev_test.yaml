sources:
  - id: sdrpp
    type: sdrpp-network
    host: host.docker.internal
    port: 7355
    caps:
      kind: audio_pcm
      sampleRate: 48000
      format: auto
      exclusive: false

decoders:
  # Pager/data decoder - POCSAG, FLEX, EAS alerts, DTMF, AFSK1200
  - id: pagers
    type: multimon-ng
    enabled: true
    options:
      modes: [POCSAG512, POCSAG1200, POCSAG2400, FLEX]

  # Digital voice decoder - DMR, P25, YSF, D-Star, NXDN, ProVoice
  - id: digital-voice
    type: dsd-fme
    enabled: true
    options:
      mode: auto
      output: null

  # APRS/AX.25 decoder - amateur radio packet
  - id: aprs
    type: direwolf
    enabled: true
    options:
      audioDevice: stdin
      sampleRate: 48000

audio:
  tcpPort: 8080
  format: S16LE
  sampleRate: 48000

api:
  host: 0.0.0.0
  port: 3000
