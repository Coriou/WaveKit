# Demodulation Testing Environment
# Usage:
#   docker compose -f docker-compose.demod-test.yml build
#   docker compose -f docker-compose.demod-test.yml run --rm demod-test
#
# Interactive shell with all tools pre-installed:
#   docker compose -f docker-compose.demod-test.yml run --rm demod-test bash

services:
  demod-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.demod-test
    volumes:
      - ./debug_audio:/data/debug_audio
      - ./scripts:/scripts
      - ./output:/output
    working_dir: /workspace
    stdin_open: true
    tty: true
